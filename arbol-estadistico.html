<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Árbol de Decisión Estadístico</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       VARIABLES GLOBALES Y RESET
    ============================================================ */
    :root {
      --bg:          #f7f6f2;
      --surface:     #ffffff;
      --surface-2:   #f0ede6;
      --surface-3:   #e8e4dc;
      --ink:         #1c1b18;
      --ink-2:       #4a4944;
      --ink-3:       #8a8880;
      --accent:      #1a4a3a;
      --accent-2:    #c8ddd7;
      --accent-3:    #e8f2ef;
      --warn:        #7a3a1a;
      --warn-light:  #f5ece6;
      --code-bg:     #1e1e1e;
      --code-text:   #d4d4d4;
      --border:      #dedad2;
      --radius-sm:   8px;
      --radius:      14px;
      --radius-lg:   20px;
      --shadow:      0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
      --shadow-lg:   0 4px 8px rgba(0,0,0,0.06), 0 16px 48px rgba(0,0,0,0.1);
      --t:           0.32s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 100px;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    .site-header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeDown 0.6s ease both;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .site-header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(30px, 5.5vw, 52px);
      font-weight: 700;
      line-height: 1.12;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .site-header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .site-header p {
      margin-top: 14px;
      color: var(--ink-2);
      font-size: 15px;
      font-weight: 300;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.65;
    }

    /* ============================================================
       TOOLBAR (progreso + reinicio)
    ============================================================ */
    .toolbar {
      width: 100%;
      max-width: 620px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .progress-wrap { flex: 1; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--ink-3);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    /* Botón reinicio siempre visible */
    .reset-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
      cursor: pointer;
      transition: border-color var(--t), color var(--t), background var(--t);
      white-space: nowrap;
    }

    .reset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-3);
    }

    .reset-btn svg { transition: transform 0.5s ease; }
    .reset-btn:hover svg { transform: rotate(-180deg); }

    /* ============================================================
       BREADCRUMB
    ============================================================ */
    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
      max-width: 620px;
      width: 100%;
      min-height: 24px;
    }

    .crumb {
      font-size: 11px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 11px;
      color: var(--ink-3);
      animation: popIn 0.25s ease both;
    }

    .crumb.last { border-color: var(--accent); color: var(--accent); background: var(--accent-3); }

    /* ============================================================
       PASO / PREGUNTA
    ============================================================ */
    .step-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 44px 44px 40px;
      width: 100%;
      max-width: 620px;
      animation: slideUp 0.38s cubic-bezier(0.4,0,0.2,1) both;
    }

    .step-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .step-question {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(19px, 3vw, 26px);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
      color: var(--ink);
    }

    .step-hint {
      font-size: 13px;
      color: var(--ink-3);
      font-weight: 300;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ============================================================
       OPCIONES
    ============================================================ */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .opt-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      cursor: pointer;
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      width: 100%;
      transition: border-color var(--t), background var(--t), transform var(--t), box-shadow var(--t);
    }

    .opt-btn:hover {
      border-color: var(--accent);
      background: var(--accent-3);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,74,58,0.1);
    }

    .opt-btn:active { transform: translateY(0); }

    .opt-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      transition: border-color var(--t);
    }

    .opt-btn:hover .opt-icon { border-color: var(--accent); }

    .opt-content strong {
      display: block;
      font-weight: 500;
      margin-bottom: 2px;
      font-size: 14px;
    }

    .opt-content small {
      font-size: 12px;
      color: var(--ink-3);
      font-weight: 300;
    }

    /* ============================================================
       RESULTADO: TARJETA PRINCIPAL
    ============================================================ */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 680px;
      overflow: hidden;
      animation: slideUp 0.42s cubic-bezier(0.4,0,0.2,1) both;
    }

    /* Cabecera del resultado */
    .result-hero {
      background: var(--accent);
      padding: 36px 40px 32px;
      color: white;
    }

    .result-hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      padding: 4px 13px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .result-hero-badge::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #6fcfb0;
    }

    .result-hero h2 {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .result-hero p {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.65;
      opacity: 0.88;
      max-width: 520px;
    }

    /* Fórmula en hero */
    .result-formula {
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      display: inline-block;
    }

    /* Cuerpo del resultado */
    .result-body {
      padding: 0 40px 36px;
    }

    /* ============================================================
       SECCIONES ACORDEÓN
    ============================================================ */
    .accordion {
      border-bottom: 1px solid var(--border);
    }

    .accordion:last-child { border-bottom: none; }

    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .accordion-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .accordion-icon-wrap {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
    }

    .accordion-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }

    .accordion-chevron {
      flex-shrink: 0;
      transition: transform var(--t);
      color: var(--ink-3);
    }

    .accordion.open .accordion-chevron { transform: rotate(180deg); }

    .accordion-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), padding 0.3s ease;
    }

    .accordion.open .accordion-body {
      max-height: 2000px;
    }

    .accordion-inner {
      padding-bottom: 22px;
    }

    /* ============================================================
       CONTENIDO DE LAS SECCIONES
    ============================================================ */
    .prose {
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.72;
      font-weight: 300;
    }

    .prose strong { color: var(--ink); font-weight: 500; }

    /* Tarjeta "cuándo NO" */
    .warn-box {
      background: var(--warn-light);
      border: 1px solid rgba(122,58,26,0.15);
      border-left: 3px solid var(--warn);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 13px;
      color: var(--warn);
      line-height: 1.6;
      margin-top: 4px;
    }

    /* Lista de supuestos */
    .assumption-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .assumption-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .assumption-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent-3);
      border: 1.5px solid var(--accent-2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      font-size: 10px;
      color: var(--accent);
      font-weight: 700;
    }

    .assumption-text { font-size: 13px; color: var(--ink-2); line-height: 1.55; font-weight: 300; }
    .assumption-text strong { color: var(--ink); font-weight: 500; }

    /* Ejemplo práctico */
    .example-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      margin-top: 4px;
    }

    .example-box p { font-size: 13px; color: var(--ink-2); line-height: 1.65; font-weight: 300; }
    .example-box strong { color: var(--ink); font-weight: 500; }

    /* Interpretación */
    .interp-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    @media (max-width: 480px) { .interp-grid { grid-template-columns: 1fr; } }

    .interp-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 14px;
    }

    .interp-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 5px;
    }

    .interp-value { font-size: 13px; color: var(--ink); line-height: 1.5; font-weight: 300; }

    /* Bloque de código Python */
    .code-block {
      background: var(--code-bg);
      border-radius: var(--radius-sm);
      padding: 20px;
      margin-top: 4px;
      overflow-x: auto;
      position: relative;
    }

    .code-lang {
      position: absolute;
      top: 10px;
      right: 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .code-block pre {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: var(--code-text);
      white-space: pre;
    }

    /* Colores de sintaxis básicos */
    .kw  { color: #569cd6; }  /* keywords */
    .fn  { color: #dcdcaa; }  /* functions */
    .str { color: #ce9178; }  /* strings */
    .cm  { color: #6a9955; }  /* comments */
    .nm  { color: #b5cea8; }  /* numbers */
    .im  { color: #c586c0; }  /* import */

    /* ============================================================
       DIVISOR EN RESULTADO
    ============================================================ */
    .result-divider {
      height: 1px;
      background: var(--border);
      margin: 0 40px;
    }

    /* ============================================================
       FOOTER DEL RESULTADO
    ============================================================ */
    .result-footer {
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      background: var(--surface-2);
    }

    .result-footer p {
      font-size: 12px;
      color: var(--ink-3);
      font-weight: 300;
    }

    .restart-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--t), transform var(--t);
    }

    .restart-cta:hover { background: var(--accent); transform: translateY(-1px); }
    .restart-cta svg { transition: transform 0.45s ease; }
    .restart-cta:hover svg { transform: rotate(-180deg); }

    /* ============================================================
       ANIMACIONES
    ============================================================ */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      body { padding: 28px 14px 80px; }
      .step-card { padding: 28px 22px 26px; }
      .result-hero { padding: 28px 22px 26px; }
      .result-body { padding: 0 22px 28px; }
      .result-divider { margin: 0 22px; }
      .result-footer { padding: 20px 22px; }
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    .site-footer {
      margin-top: 56px;
      text-align: center;
      font-size: 11px;
      color: var(--ink-3);
      font-weight: 300;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       CABECERA
  ============================================================ -->
  <header class="site-header">
    <div class="eyebrow">Metodología de Investigación</div>
    <h1>Árbol de Decisión<br/><em>Estadístico</em></h1>
    <p>Selecciona la prueba estadística correcta para tu análisis, paso a paso, con explicaciones completas.</p>
  </header>

  <!-- ============================================================
       BARRA DE PROGRESO + BOTÓN REINICIO
  ============================================================ -->
  <div class="toolbar">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progressLabel">Inicio</span>
        <span id="progressPct">0 %</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <button class="reset-btn" onclick="restart()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
      </svg>
      Reiniciar
    </button>
  </div>

  <!-- ============================================================
       HISTORIAL DE SELECCIONES
  ============================================================ -->
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- ============================================================
       CONTENEDOR PRINCIPAL
  ============================================================ -->
  <div id="app"></div>

  <!-- ============================================================
       PIE DE PÁGINA
  ============================================================ -->
  <footer class="site-footer">
    Árbol de decisión estadístico · Con fines educativos<br/>
    Los ejemplos de código usan Python con scipy, statsmodels y pandas
  </footer>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
  /* ============================================================
     SECCIÓN 1: BASE DE DATOS DE PRUEBAS ESTADÍSTICAS
     Cada entrada contiene todos los campos para la tarjeta resultado.
  ============================================================ */
  const TESTS = {

    /* ── t de Student independiente ── */
    t_student: {
      name: "t de Student para muestras independientes",
      desc: "Compara las medias de dos grupos independientes para determinar si la diferencia observada es estadísticamente significativa o producto del azar.",
      formula: "t = (x̄₁ − x̄₂) / √(s²p · (1/n₁ + 1/n₂))",
      cuando: "Cuando tienes exactamente dos grupos distintos (control vs. experimental, hombres vs. mujeres) y mides una variable continua como peso, tiempo, puntuación o concentración.",
      cuando_no: "No usar si los grupos no son independientes (usa <strong>t pareada</strong>), si hay más de dos grupos (usa <strong>ANOVA</strong>), si la variable dependiente es categórica (usa <strong>Chi-cuadrado</strong>), o si los datos son claramente no normales con muestras pequeñas (usa <strong>Mann-Whitney</strong>).",
      supuestos: [
        { label: "Independencia", text: "Las observaciones de un grupo no influyen en el otro. Cada sujeto debe pertenecer solo a un grupo." },
        { label: "Normalidad", text: "La variable dependiente sigue una distribución normal en cada grupo. Con n > 30 por grupo, el TCL hace la prueba robusta." },
        { label: "Homocedasticidad", text: "Las varianzas de ambos grupos son iguales. Si no, usar la versión de Welch (por defecto en muchos programas)." },
        { label: "Variable continua", text: "La variable dependiente debe ser de escala de intervalo o razón (no categorías ni rangos puros)." }
      ],
      ejemplo: "<strong>Ejemplo:</strong> Un investigador compara el nivel de colesterol (mg/dL) entre pacientes que recibieron un nuevo fármaco (n=25) versus placebo (n=25). Desea saber si el fármaco reduce el colesterol de forma significativa.",
      interpretacion: [
        { label: "p < 0.05", val: "Diferencia estadísticamente significativa. Se rechaza H₀ de igualdad de medias." },
        { label: "p ≥ 0.05", val: "Sin evidencia suficiente para afirmar diferencia entre grupos." },
        { label: "t > 0", val: "La media del grupo 1 es mayor que la del grupo 2." },
        { label: "IC 95 %", val: "Si el intervalo de confianza de la diferencia no contiene 0, hay diferencia significativa." }
      ],
      python: `<span class="im">from</span> scipy <span class="im">import</span> stats
<span class="im">import</span> pandas <span class="kw">as</span> pd

<span class="cm"># Datos de ejemplo</span>
grupo_a = [<span class="nm">210</span>, <span class="nm">215</span>, <span class="nm">198</span>, <span class="nm">220</span>, <span class="nm">205</span>]
grupo_b = [<span class="nm">190</span>, <span class="nm">185</span>, <span class="nm">192</span>, <span class="nm">188</span>, <span class="nm">195</span>]

<span class="cm"># t de Student con varianzas iguales</span>
t_stat, p_val = stats.<span class="fn">ttest_ind</span>(grupo_a, grupo_b, equal_var=<span class="kw">True</span>)

<span class="cm"># Varianzas desiguales (Welch) → equal_var=False</span>
<span class="fn">print</span>(<span class="str">f"t = {t_stat:.3f}, p = {p_val:.4f}"</span>)

<span class="cm"># Tamaño del efecto (Cohen's d)</span>
<span class="im">import</span> numpy <span class="kw">as</span> np
d = (np.<span class="fn">mean</span>(grupo_a) - np.<span class="fn">mean</span>(grupo_b)) / np.<span class="fn">std</span>(grupo_a + grupo_b)
<span class="fn">print</span>(<span class="str">f"Cohen's d = {d:.3f}"</span>)`

        { label: "0.5 – 0.75", val: "Confiabilidad moderada." },
        { label: "0.75 – 0.9", val: "Confiabilidad buena." },
        { label: "ICC > 0.9", val: "Confiabilidad excelente." }
      ],
      python: `<span class="im">import</span> pingouin <span class="kw">as</span> pg  <span class="cm"># pip install pingouin</span>
<span class="im">import</span> pandas <span class="kw">as</span> pd

<span class="cm"># Datos: cada columna = un evaluador, cada fila = un sujeto</span>
df = pd.<span class="fn">DataFrame</span>({
    <span class="str">'eval1'</span>: [<span class="nm">45</span>,<span class="nm">52</span>,<span class="nm">60</span>,<span class="nm">48</span>,<span class="nm">55</span>],
    <span class="str">'eval2'</span>: [<span class="nm">44</span>,<span class="nm">50</span>,<span class="nm">61</span>,<span class="nm">47</span>,<span class="nm">56</span>],
    <span class="str">'eval3'</span>: [<span class="nm">46</span>,<span class="nm">53</span>,<span class="nm">59</span>,<span class="nm">49</span>,<span class="nm">54</span>]
})

icc_result = pg.<span class="fn">intraclass_corr</span>(
    data = df.<span class="fn">melt</span>(var_name=<span class="str">'rater'</span>, value_name=<span class="str">'score'</span>).<span class="fn">assign</span>(
               target=df.<span class="fn">index</span>.<span class="fn">repeat</span>(<span class="nm">3</span>).<span class="fn">tolist</span>()),
    targets=<span class="str">'target'</span>, raters=<span class="str">'rater'</span>, ratings=<span class="str">'score'</span>
)
<span class="fn">print</span>(icc_result)`
    },

    /* ── Shapiro-Wilk ── */
    shapiro: {
      name: "Shapiro-Wilk / Kolmogorov-Smirnov",
      desc: "Pruebas de bondad de ajuste que evalúan si una muestra de datos proviene de una distribución normal. Son el paso previo a elegir entre pruebas paramétricas y no paramétricas.",
      formula: "W = (Σ aᵢ x₍ᵢ₎)² / Σ(xᵢ − x̄)²",
      cuando: "Antes de aplicar cualquier prueba paramétrica (t de Student, ANOVA, Pearson). Shapiro-Wilk es preferible con n ≤ 50; Kolmogorov-Smirnov para muestras grandes.",
      cuando_no: "Una prueba de normalidad fallida no descarta automáticamente las pruebas paramétricas: con n > 30, el Teorema Central del Límite las hace robustas. La decisión debe complementarse con gráficos Q-Q.",
      supuestos: [
        { label: "H₀", text: "La muestra proviene de una distribución normal." },
        { label: "H₁", text: "La muestra NO proviene de una distribución normal." }
      ],
      ejemplo: "<strong>Ejemplo:</strong> Antes de aplicar ANOVA para comparar grupos de pacientes, se verifica la normalidad de cada grupo con Shapiro-Wilk. Si algún grupo falla (p < 0.05), se evalúa usar Kruskal-Wallis.",
      interpretacion: [
        { label: "p > 0.05", val: "No se rechaza normalidad. Los datos son compatibles con distribución normal." },
        { label: "p < 0.05", val: "Se rechaza normalidad. Considerar pruebas no paramétricas o transformar los datos." },
        { label: "Q-Q plot", val: "Complementar siempre con gráfico cuantil-cuantil. Puntos sobre la diagonal = normalidad." }
      ],
      python: `<span class="im">from</span> scipy <span class="im">import</span> stats
<span class="im">import</span> matplotlib.pyplot <span class="kw">as</span> plt

datos = [<span class="nm">23</span>, <span class="nm">25</span>, <span class="nm">22</span>, <span class="nm">28</span>, <span class="nm">26</span>, <span class="nm">24</span>, <span class="nm">27</span>, <span class="nm">25</span>]

<span class="cm"># Shapiro-Wilk (recomendado para n ≤ 50)</span>
w_stat, p_sw = stats.<span class="fn">shapiro</span>(datos)
<span class="fn">print</span>(<span class="str">f"Shapiro-Wilk: W={w_stat:.3f}, p={p_sw:.4f}"</span>)

<span class="cm"># Kolmogorov-Smirnov (para muestras grandes)</span>
_, p_ks = stats.<span class="fn">kstest</span>(datos, <span class="str">'norm'</span>,
           args=(stats.<span class="fn">mean</span>(datos), stats.<span class="fn">sem</span>(datos)))
<span class="fn">print</span>(<span class="str">f"K-S: p={p_ks:.4f}"</span>)

<span class="cm"># Gráfico Q-Q</span>
stats.<span class="fn">probplot</span>(datos, dist=<span class="str">"norm"</span>, plot=plt)
plt.<span class="fn">show</span>()`
    }

  }; // fin TESTS

  /* ============================================================
     SECCIÓN 2: ÁRBOL DE DECISIÓN
     Cada nodo: tipo 'q' (pregunta) o 'r' (resultado → clave de TESTS)
  ============================================================ */
  const TREE = {
    id: 'root',
    type: 'q',
    step: 1, totalSteps: 5,
    text: '¿Qué deseas hacer con tus datos?',
    hint: 'El objetivo principal de tu análisis determina la familia de pruebas a explorar.',
    opts: [
      { label: 'Comparar grupos',            icon: '⚖️', desc: 'Ver si hay diferencias entre conjuntos',   next: 'cmp_n' },
      { label: 'Analizar relación',           icon: '🔗', desc: 'Explorar asociación entre variables',      next: 'rel_types' },
      { label: 'Predecir una variable',       icon: '📈', desc: 'Estimar valores a partir de predictores',  next: 'pred_type' },
      { label: 'Verificar normalidad primero',icon: '📐', desc: 'Paso previo a elegir prueba paramétrica',  next: 'r_shapiro' }
    ]
  };

  const NODES = {

    /* ── Rama COMPARAR ── */
    cmp_n: {
      id:'cmp_n', type:'q', step:2, totalSteps:5,
      text: '¿Cuántos grupos deseas comparar?',
      hint: 'Cuenta los grupos o condiciones que quieres contrastar.',
      opts: [
        { label:'1 grupo',    icon:'①', desc:'Comparar con valor de referencia',     next:'cmp_1g_var' },
        { label:'2 grupos',   icon:'②', desc:'Dos muestras o condiciones',            next:'cmp_2g_rel' },
        { label:'3 o más',   icon:'③', desc:'Múltiples grupos o condiciones',        next:'cmp_3g_rel' }
      ]
    },

    /* 1 grupo */
    cmp_1g_var: {
      id:'cmp_1g_var', type:'q', step:3, totalSteps:5,
      text: '¿Qué tipo de variable tienes?',
      hint: '',
      opts: [
        { label:'Numérica (continua)', icon:'🔢', desc:'Peso, tiempo, temperatura…', next:'cmp_1g_param' },
        { label:'Categórica',          icon:'🏷️', desc:'Proporciones, categorías',    next:'r_chi2' }
      ]
    },
    cmp_1g_param: {
      id:'cmp_1g_param', type:'q', step:4, totalSteps:5,
      text: '¿Los datos siguen distribución normal?',
      hint: '',
      opts: [
        { label:'Sí',           icon:'✔', desc:'Normalidad confirmada', next:'r_t_one' },

      ]
    },

    /* 2 grupos */
    cmp_2g_rel: {
      id:'cmp_2g_rel', type:'q', step:3, totalSteps:5,
      text: '¿Los grupos son independientes o relacionados?',
      hint: 'Independientes = sujetos distintos. Relacionados = mismos sujetos en ambas condiciones.',
      opts: [
        { label:'Independientes',          icon:'↔', desc:'Sujetos distintos en cada grupo', next:'cmp_2gi_var' },
        { label:'Relacionados / Pareados', icon:'🔄', desc:'Mismos sujetos, dos condiciones', next:'cmp_2gr_var' }
      ]
    },
    cmp_2gi_var: {
      id:'cmp_2gi_var', type:'q', step:4, totalSteps:5,
      text: '¿Qué tipo de variable es la dependiente?',
      hint: '',
      opts: [
        { label:'Numérica (continua)', icon:'🔢', desc:'', next:'cmp_2gi_param' },
        { label:'Categórica',          icon:'🏷️', desc:'Proporciones, frecuencias', next:'r_chi2' }
      ]
    },
    cmp_2gi_param: {
      id:'cmp_2gi_param', type:'q', step:5, totalSteps:5,
      text: '¿Los datos cumplen supuestos paramétricos (normalidad)?',
      hint: 'Si no estás seguro, usa Shapiro-Wilk. Con n > 30 por grupo suele asumirse normalidad.',
      opts: [
        { label:'Sí',         icon:'✔', desc:'Normalidad confirmada',        next:'r_t_student' },
        { label:'No / No sé', icon:'✘', desc:'No paramétrico o muestra pequeña', next:'r_mann_whitney' }
      ]
    },
    cmp_2gr_var: {
      id:'cmp_2gr_var', type:'q', step:4, totalSteps:5,
      text: '¿Qué tipo de variable es la dependiente?',
      hint: '',
      opts: [
        { label:'Numérica (continua)', icon:'🔢', desc:'', next:'cmp_2gr_param' },
        { label:'Categórica',          icon:'🏷️', desc:'Proporciones, frecuencias', next:'r_chi2' }
      ]
    },
    cmp_2gr_param: {
      id:'cmp_2gr_param', type:'q', step:5, totalSteps:5,
      text: '¿Los datos cumplen supuestos paramétricos?',
      hint: 'Para t pareada, las diferencias entre pares deben ser normales.',
      opts: [
        { label:'Sí',         icon:'✔', desc:'Diferencias normales',        next:'r_t_paired' },
        { label:'No / No sé', icon:'✘', desc:'Distribución desconocida',    next:'r_wilcoxon' }
      ]
    },

    /* 3+ grupos */
    cmp_3g_rel: {
      id:'cmp_3g_rel', type:'q', step:3, totalSteps:5,
      text: '¿Los grupos son independientes o relacionados?',
      hint: '',
      opts: [
        { label:'Independientes',          icon:'↔', desc:'Grupos con sujetos distintos', next:'cmp_3gi_param' },
        { label:'Relacionados (repetidas)',icon:'🔄', desc:'Mismos sujetos, múltiples condiciones', next:'cmp_3gr_param' },
        { label:'Dos factores simultáneos',icon:'⊞', desc:'ANOVA con dos variables independientes', next:'r_anova_factorial' }
      ]
    },
    cmp_3gi_param: {
      id:'cmp_3gi_param', type:'q', step:4, totalSteps:5,
      text: '¿Los datos cumplen supuestos paramétricos?',
      hint: 'Verificar normalidad por grupo y homocedasticidad (Levene).',
      opts: [
        { label:'Sí',         icon:'✔', desc:'Normal y varianzas homogéneas', next:'r_anova' },
        { label:'No / No sé', icon:'✘', desc:'No paramétrico o datos ordinales', next:'r_kruskal' }
      ]
    },
    cmp_3gr_param: {
      id:'cmp_3gr_param', type:'q', step:4, totalSteps:5,
      text: '¿Los datos cumplen supuestos paramétricos?',
      hint: 'Se requiere esfericidad (Mauchly). Si no, corregir con Greenhouse-Geisser.',
      opts: [
        { label:'Sí',         icon:'✔', desc:'Normalidad y esfericidad',     next:'r_anova_mr' },
        { label:'No / No sé', icon:'✘', desc:'Datos ordinales o no normales', next:'r_friedman' }
      ]
    },

    /* ── Rama RELACIÓN ── */
    rel_types: {
      id:'rel_types', type:'q', step:2, totalSteps:4,
      text: '¿Qué tipo de variables deseas relacionar?',
      hint: 'Identifica la escala de medición de ambas variables.',
      opts: [
        { label:'Numérica ↔ Numérica',  icon:'🔢', desc:'Ambas continuas o discretas',    next:'rel_num_param' },
        { label:'Categórica ↔ Categórica', icon:'🏷️', desc:'Variables nominales u ordinales', next:'r_chi2' },
        { label:'Concordancia / Confiabilidad', icon:'🎯', desc:'Dos evaluadores o mediciones repetidas', next:'rel_agreement' }
      ]
    },
    rel_num_param: {
      id:'rel_num_param', type:'q', step:3, totalSteps:4,
      text: '¿Las variables siguen distribución normal y la relación es lineal?',
      hint: 'Usa un gráfico de dispersión para evaluar si la tendencia es lineal.',
      opts: [
        { label:'Sí, distribución normal y lineal', icon:'✔', desc:'', next:'r_pearson' },
        { label:'No / Datos ordinales o no lineal',  icon:'✘', desc:'', next:'r_spearman' }
      ]
    },
    rel_agreement: {
      id:'rel_agreement', type:'q', step:3, totalSteps:4,
      text: '¿Qué tipo de variable están midiendo los evaluadores?',
      hint: '',
      opts: [
        { label:'Categórica (diagnóstico, clasificación)', icon:'🏷️', desc:'Acuerdo entre categorías', next:'r_kappa' },
        { label:'Continua (medición numérica)',            icon:'🔢', desc:'Reproducibilidad de medidas', next:'r_icc' }
      ]
    },

    /* ── Rama PREDICCIÓN ── */
    pred_type: {
      id:'pred_type', type:'q', step:2, totalSteps:3,
      text: '¿Qué tipo de variable deseas predecir?',
      hint: 'La naturaleza de la variable de respuesta define el modelo de regresión.',
      opts: [
        { label:'Variable continua',   icon:'📏', desc:'Salario, temperatura, puntuación…', next:'r_reg_lineal' },
        { label:'Variable categórica', icon:'🎯', desc:'Sí/No, grupo, clase, diagnóstico…', next:'r_reg_logistica' },
        { label:'Tiempo hasta evento', icon:'⏱️', desc:'Supervivencia, tiempo de fallo',     next:'r_kaplan' }
      ]
    },

    /* ── NODOS RESULTADO (tipo 'r') ── */
    r_t_student:       { type:'r', key:'t_student' },
    r_mann_whitney:    { type:'r', key:'mann_whitney' },
    r_t_paired:        { type:'r', key:'t_paired' },
    r_wilcoxon:        { type:'r', key:'wilcoxon' },
    r_wilcoxon_1:      { type:'r', key:'wilcoxon_1' },
    r_t_one:           { type:'r', key:'t_one' },
    r_anova:           { type:'r', key:'anova' },
    r_kruskal:         { type:'r', key:'kruskal' },
    r_anova_mr:        { type:'r', key:'anova_mr' },
    r_friedman:        { type:'r', key:'friedman' },
    r_anova_factorial: { type:'r', key:'anova_factorial' },
    r_chi2:            { type:'r', key:'chi2' },
    r_pearson:         { type:'r', key:'pearson' },
    r_spearman:        { type:'r', key:'spearman' },
    r_reg_lineal:      { type:'r', key:'reg_lineal' },
    r_reg_logistica:   { type:'r', key:'reg_logistica' },
    r_kaplan:          { type:'r', key:'kaplan' },
    r_kappa:           { type:'r', key:'kappa' },
    r_icc:             { type:'r', key:'icc' },
    r_shapiro:         { type:'r', key:'shapiro' }
  };

  /* ============================================================
     SECCIÓN 3: ESTADO Y NAVEGACIÓN
  ============================================================ */
  let navHistory   = [];   // pila de nodos (IDs o 'root')
  let selections   = [];   // etiquetas elegidas
  let currentNode  = TREE;

  /* ---- Actualizar barra de progreso ---- */
  function updateProgress(step, total) {
    const pct = total ? Math.round((step / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent  = pct + ' %';
    document.getElementById('progressLabel').textContent = step ? `Paso ${step} de ${total}` : 'Inicio';
  }

  /* ---- Actualizar breadcrumb ---- */
  function updateBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    bc.innerHTML = '';
    selections.forEach((sel, i) => {
      const s = document.createElement('span');
      s.className = 'crumb' + (i === selections.length - 1 ? ' last' : '');
      s.textContent = sel;
      bc.appendChild(s);
    });
  }

  /* ---- Seleccionar opción ---- */
  function choose(opt) {
    navHistory.push(currentNode.id || 'root');
    selections.push(opt.label);
    updateBreadcrumb();

    const nextId   = opt.next;
    const nextNode = nextId === 'root' ? TREE : NODES[nextId];

    if (!nextNode) { console.error('Nodo no encontrado:', nextId); return; }

    currentNode = nextNode;

    if (nextNode.type === 'r') {
      renderResult(TESTS[nextNode.key]);
      updateProgress(nextNode.totalSteps || 5, nextNode.totalSteps || 5);
    } else {
      renderQuestion(nextNode);
      updateProgress(nextNode.step, nextNode.totalSteps);
    }
  }

  /* ---- Reiniciar ---- */
  function restart() {
    navHistory  = [];
    selections  = [];
    currentNode = TREE;
    updateBreadcrumb();
    updateProgress(0, 0);
    renderQuestion(TREE);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ============================================================
     SECCIÓN 4: RENDER DE PREGUNTA
  ============================================================ */
  function renderQuestion(node) {
    const app = document.getElementById('app');
    app.innerHTML = '';

    const card = document.createElement('div');
    card.className = 'step-card';

    card.innerHTML = `
      <div class="step-label">Paso ${node.step} de ${node.totalSteps}</div>
      <div class="step-question">${node.text}</div>
      ${node.hint ? `<div class="step-hint">${node.hint}</div>` : ''}
      <div class="options-grid" id="opts"></div>
    `;

    app.appendChild(card);

    const grid = card.querySelector('#opts');
    node.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `
        <span class="opt-icon">${opt.icon}</span>
        <span class="opt-content">
          <strong>${opt.label}</strong>
          ${opt.desc ? `<small>${opt.desc}</small>` : ''}
        </span>
      `;
      btn.addEventListener('click', () => choose(opt));
      grid.appendChild(btn);
    });
  }

  /* ============================================================
     SECCIÓN 5: RENDER DE RESULTADO
  ============================================================ */
  function renderResult(test) {
    const app = document.getElementById('app');
    app.innerHTML = '';

    const card = document.createElement('div');
    card.className = 'result-card';

    /* Acordeones de contenido */
    const sections = [
      {
        id: 'cuando',
        icon: '✅', bg: '#e8f5e9',
        title: '¿Cuándo usarla?',
        html: `<p class="prose">${test.cuando}</p>`
      },
      {
        id: 'cuando_no',
        icon: '⚠️', bg: '#fff3e0',
        title: '¿Cuándo NO usarla?',
        html: `<div class="warn-box">${test.cuando_no}</div>`
      },
      {
        id: 'supuestos',
        icon: '📋', bg: '#e8eaf6',
        title: 'Supuestos (en lenguaje simple)',
        html: `<div class="assumption-list">${
          test.supuestos.map((s, i) => `
            <div class="assumption-item">
              <div class="assumption-dot">${i+1}</div>
              <div class="assumption-text"><strong>${s.label}:</strong> ${s.text}</div>
            </div>`).join('')
        }</div>`
      },
      {
        id: 'ejemplo',
        icon: '📝', bg: '#f3e5f5',
        title: 'Ejemplo práctico',
        html: `<div class="example-box"><p>${test.ejemplo}</p></div>`
      },
      {
        id: 'interp',
        icon: '🔍', bg: '#e0f2f1',
        title: 'Cómo interpretar el resultado',
        html: `<div class="interp-grid">${
          test.interpretacion.map(i => `
            <div class="interp-item">
              <div class="interp-label">${i.label}</div>
              <div class="interp-value">${i.val}</div>
            </div>`).join('')
        }</div>`
      },
      {
        id: 'python',
        icon: '🐍', bg: '#e8f5e9',
        title: 'Implementación en Python',
        html: `<div class="code-block"><span class="code-lang">Python</span><pre>${test.python}</pre></div>`
      }
    ];

    const accordionsHTML = sections.map(s => `
      <div class="accordion" id="acc-${s.id}">
        <div class="accordion-header" onclick="toggleAccordion('acc-${s.id}')">
          <div class="accordion-header-left">
            <div class="accordion-icon-wrap" style="background:${s.bg}">${s.icon}</div>
            <span class="accordion-title">${s.title}</span>
          </div>
          <svg class="accordion-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
        <div class="accordion-body">
          <div class="accordion-inner">${s.html}</div>
        </div>
      </div>
    `).join('');

    card.innerHTML = `
      <!-- HERO -->
      <div class="result-hero">
        <div class="result-hero-badge">Prueba recomendada</div>
        <h2>${test.name}</h2>
        <p>${test.desc}</p>
        ${test.formula ? `<div class="result-formula">${test.formula}</div>` : ''}
      </div>

      <!-- ACORDEONES -->
      <div class="result-body">
        ${accordionsHTML}
      </div>

      <div class="result-divider"></div>

      <!-- FOOTER -->
      <div class="result-footer">
        <p>Los resultados son orientativos — consulta con un estadístico para casos complejos.</p>
        <button class="restart-cta" onclick="restart()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
          </svg>
          Nuevo análisis
        </button>
      </div>
    `;

    app.appendChild(card);

    /* Abrir primer acordeón automáticamente */
    setTimeout(() => toggleAccordion('acc-cuando'), 200);
  }

  /* ============================================================
     SECCIÓN 6: ACORDEÓN
  ============================================================ */
  function toggleAccordion(id) {
    const acc = document.getElementById(id);
    if (!acc) return;
    acc.classList.toggle('open');
  }

  /* ============================================================
     ARRANQUE
  ============================================================ */
  renderQuestion(TREE);
  </script>
</body>
